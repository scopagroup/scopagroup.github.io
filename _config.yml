theme: jekyll-theme-minimal
title: "SCOPA" 
description: "Computational Mathematics • Scientific ML • Inverse Problems"
url: "https://scopagroup.github.io"
baseurl: "/scopagroup"
repository: "scopagroup/scopagroup"
locale: en-US

remote_theme: "mmistakes/minimal-mistakes@4.27.3"

markdown: kramdown
kramdown:
  input: GFM
permalink: "/:categories/:title/"
timezone: "America/Chicago"

plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jemoji
  - jekyll-redirect-from
  - jekyll-include-cache

collections:
  people:
    output: true
    permalink: "/people/:name/"
  publications:
    output: true
    permalink: "/publications/:title/"
  teaching:
    output: true
    permalink: "/teaching/:name/"

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: "single"
      author_profile: true
      sidebar:
        nav: "main"
  - scope:
      path: ""
      type: posts
    values:
      layout: "single"
      read_time: true
      author_profile: true
      share: true
  - scope:
      path: ""
      type: people
    values:
      layout: "single"
      author_profile: false
  - scope:
      path: ""
      type: publications
    values:
      layout: "single"
      author_profile: false

paginate: 5
paginate_path: "/page:num/"
