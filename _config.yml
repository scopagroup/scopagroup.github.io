title: "SCOPA"

url: 
repo: https://github.com/scopagroup/scopagroup.github.io 

title: SCOPA 
description: "Computational Mathematics • Scientific ML • Inverse Problems"
# Replace with your org/user and repo. For user/organization sites, set baseurl: "".
url: https://scopagroup.github.io
baseurl: /scopagroup.github.io
repository: scopagroup/scopagroup.github.io
locale: en-US

remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: default  # other options: dark, air, contrast, etc.

markdown: kramdown
kramdown:
  input: GFM
permalink: /:categories/:title/
timezone: America/Chicago

# Only GitHub Pages–safe plugins listed below
plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jemoji
  - jekyll-redirect-from
  - jekyll-include-cache

paginate: 10
paginate_path: /page:num/

collections:
  people:
    output: true
    permalink: /people/:name/
  projects:
    output: true
    permalink: /projects/:name/
  publications:
    output: true
    permalink: /publications/:title/

defaults:
  # Pages (About, Contact, etc.)
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: main
  # People collection
  - scope:
      path: ""
      type: people
    values:
      layout: single
      author_profile: false
      sidebar:
        nav: people
  # Projects collection
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      sidebar:
        nav: projects
  # Publications collection
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      sidebar:
        nav: publications


logo: _assets/scopa-plant.jpeg       # optional
#favicon: /assets/images/favicon.ico  # optional

author:
  name: "SCOPA Group"
  avatar: _assets/scopa-plant.jpeg    # optional
  bio: "Department of Mathematics, University of Houston"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/andreasmang"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:anreas@math.uh.edu"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
