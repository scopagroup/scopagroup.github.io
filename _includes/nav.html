<nav class="site-nav" role="navigation">
  <ul class="nav-list">
    {% assign here = page.url | replace: "index.html","" %}
    {% for item in site.nav_pages %}
      {% assign is_active = (here == item.url) %}
      <li class="nav-item">
        <a href="{{ item.url | relative_url }}" class="nav-link{% if is_active %} active{% endif %}">
          {{ item.title }}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
<style>
/* Light, theme-friendly top nav that complements Leap day’s sidebar */
.site-nav { 
  border-bottom: 1px solid #e5e5e5; 
  padding: 0.6rem 0; 
  margin-bottom: 1rem;
}
.nav-list { 
  list-style: none; 
  padding: 0; 
  margin: 0; 
  display: flex; 
  gap: 1rem; 
  flex-wrap: wrap;
}
.nav-link { 
  text-decoration: none; 
  padding: 0.25rem 0.5rem; 
  border-radius: 6px;
}
.nav-link:hover { 
  text-decoration: underline; 
}
.nav-link.active { 
  font-weight: 700; 
  outline: 1px solid #e5e5e5; 
}
</style>
